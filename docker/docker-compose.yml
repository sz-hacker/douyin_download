services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.ghcr
      args:
        # 使用相对路径，nginx 会通过反向代理转发到后端
        VITE_API_BASE_URL: /api
    container_name: douyin-download-frontend
    ports:
      - "9527:9527"
    depends_on:
      - backend
    networks:
      - douyin-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.ghcr
    container_name: douyin-download-backend
    ports:
      - "9528:9528"
    volumes:
      # 挂载输出目录，方便查看下载的文件
      - ../output:/app/output
    networks:
      - douyin-network
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

networks:
  douyin-network:
    driver: bridge

